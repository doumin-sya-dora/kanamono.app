<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>建具金物計算アプリ iPhone最適化版</title>

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#dbe3ee;
      --text:#1f2937;
      --sub:#6b7280;
      --blue:#2563eb;
      --blue-soft:#eff6ff;
      --green:#16a34a;
      --red:#dc2626;
      --shadow:0 6px 20px rgba(15,23,42,.08);
      --r:16px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    body{
      padding:
        max(12px, env(safe-area-inset-top))
        12px
        max(24px, calc(env(safe-area-inset-bottom) + 18px))
        12px;
    }

    .app{
      max-width:680px;
      margin:0 auto;
    }

    .title{
      font-size:22px;
      font-weight:800;
      line-height:1.3;
      margin:4px 2px 12px;
      letter-spacing:.02em;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:12px;
      margin-bottom:12px;
    }

    .panel h2{
      margin:0 0 10px;
      font-size:15px;
      line-height:1.4;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .grid.two{
      grid-template-columns:1fr 1fr;
    }

    @media (max-width: 520px){
      .grid.two{
        grid-template-columns:1fr;
      }
    }

    label{
      display:block;
      font-size:12px;
      color:var(--sub);
      font-weight:700;
      margin-bottom:6px;
    }

    input, select, button{
      width:100%;
      min-height:48px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-size:16px;
      padding:12px 14px;
      appearance:none;
      -webkit-appearance:none;
    }

    input:focus, select:focus{
      outline:none;
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,.14);
    }

    button{
      border:none;
      background:var(--blue);
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }

    button.secondary{
      background:#eef2f7;
      color:var(--text);
      border:1px solid var(--line);
    }

    button.danger{
      background:var(--red);
    }

    .mini{
      margin-top:6px;
      font-size:12px;
      color:var(--sub);
      line-height:1.5;
    }

    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    @media (max-width: 520px){
      .action-row{
        grid-template-columns:1fr;
      }
    }

    .equation-wrap{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .equation{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:6px;
      padding:10px;
      background:var(--blue-soft);
      border:1px solid #cfe0ff;
      border-radius:14px;
      overflow:hidden;
    }

    .term{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      max-width:100%;
      padding:6px 10px;
      background:#fff;
      border:1px solid #cfe0ff;
      border-radius:10px;
      font-size:12px;
      font-weight:800;
      line-height:1.3;
      white-space:normal;
      word-break:break-word;
      text-align:center;
    }

    .operator{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:20px;
      min-width:20px;
      height:20px;
      font-size:16px;
      font-weight:900;
      color:var(--blue);
      flex:0 0 auto;
    }

    .result-box{
      border:2px solid #9ae6b4;
      border-radius:14px;
      background:#fff;
      padding:12px;
    }

    .result-label{
      font-size:12px;
      color:var(--sub);
      font-weight:700;
      margin-bottom:6px;
    }

    .result-value{
      font-size:30px;
      line-height:1.1;
      font-weight:900;
      color:var(--green);
      word-break:break-word;
    }

    .sub-result{
      margin-top:8px;
      font-size:13px;
      color:var(--sub);
      line-height:1.5;
      word-break:break-word;
    }

    .preview-title{
      font-size:12px;
      font-weight:700;
      color:var(--sub);
      margin-bottom:6px;
    }

    .preview{
      background:#0f172a;
      color:#e5e7eb;
      border-radius:14px;
      padding:12px;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:12px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    details{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      overflow:hidden;
    }

    summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
      padding:13px 12px;
      background:#f8fafc;
      border-bottom:1px solid var(--line);
      font-size:14px;
      font-weight:800;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    .list-wrap{
      padding:10px;
    }

    .empty{
      color:var(--sub);
      font-size:13px;
      padding:4px 2px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#fff;
      margin-bottom:10px;
    }

    .item-head{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .item-title{
      font-size:14px;
      font-weight:800;
      line-height:1.4;
      word-break:break-word;
    }

    .badge{
      align-self:flex-start;
      font-size:12px;
      font-weight:700;
      background:#eef2ff;
      color:#3730a3;
      padding:4px 8px;
      border-radius:999px;
    }

    .item-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .item-grid .full{
      grid-column:1 / -1;
    }

    @media (max-width: 520px){
      .item-grid{
        grid-template-columns:1fr;
      }
    }

    .ghost-btn{
      background:#fff;
      color:var(--red);
      border:1px solid #fecaca;
      font-weight:800;
    }

    .footer-space{
      height:16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">建具金物計算アプリ</div>

    <div class="panel">
      <h2>基本入力</h2>

      <div class="grid">
        <div>
          <label for="doorType">計算タイプ</label>
          <select id="doorType">
            <option value="france">親W＋召合わせ＋フランス落とし</option>
            <option value="custom">自由計算</option>
          </select>
        </div>

        <div class="grid two">
          <div>
            <label for="parentW">親W</label>
            <input id="parentW" type="number" inputmode="decimal" placeholder="例: 900" />
          </div>
          <div>
            <label for="meeting">召合わせ寸法</label>
            <input id="meeting" type="number" inputmode="decimal" placeholder="例: 6" />
          </div>
        </div>

        <div class="mini">召合わせは表示時に自動で半分になって <b>6(3)</b> の形で表示されます。</div>

        <div class="grid two">
          <div>
            <label for="franceType">フランス落とし種類</label>
            <select id="franceType">
              <option value="DE6VN" selected>DE6VN (18.5)</option>
              <option value="DC800">DC800</option>
              <option value="none">なし</option>
            </select>
          </div>
          <div>
            <label for="franceValue">フランス落とし寸法</label>
            <input id="franceValue" type="number" inputmode="decimal" placeholder="自動入力" />
          </div>
        </div>

        <div>
          <label for="calcMode">演算方法</label>
          <select id="calcMode">
            <option value="minus">親W － 召合わせ(半表示) － フランス落とし</option>
            <option value="plus">親W ＋ 召合わせ(半表示) ＋ フランス落とし</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>追加金物</h2>

      <div class="grid">
        <div class="grid two">
          <div>
            <label for="newName">名称</label>
            <input id="newName" type="text" placeholder="例: 丁番 / ストライク / 引手" />
          </div>
          <div>
            <label for="newType">種類</label>
            <input id="newType" type="text" placeholder="例: LA / 標準 / 特注" />
          </div>
        </div>

        <div class="grid two">
          <div>
            <label for="newValue">寸法</label>
            <input id="newValue" type="number" inputmode="decimal" placeholder="例: 25" />
          </div>
          <div>
            <label for="newOp">符号</label>
            <select id="newOp">
              <option value="+">＋</option>
              <option value="-">－</option>
            </select>
          </div>
        </div>

        <div class="grid two">
          <div>
            <label for="newThickness">厚み（ストライク用など）</label>
            <input id="newThickness" type="number" inputmode="decimal" step="0.1" placeholder="例: 2.5" />
          </div>
          <div>
            <label for="newFrameThickness">枠板厚</label>
            <input id="newFrameThickness" type="number" inputmode="decimal" step="0.1" placeholder="例: 1.6" />
          </div>
        </div>

        <div class="action-row">
          <button id="addHardwareBtn">金物を追加</button>
          <button id="resetBtn" class="secondary">全部リセット</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>計算プレビュー</h2>

      <div class="equation-wrap">
        <div id="equation" class="equation"></div>

        <div class="result-box">
          <div class="result-label">計算結果</div>
          <div id="resultValue" class="result-value">0</div>
          <div id="resultText" class="sub-result">式がここに表示されます</div>
        </div>

        <div>
          <div class="preview-title">現場向け表示</div>
          <div id="previewText" class="preview">親W900－召合わせ6(3)－DE6VN(18.5)=878.5</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>金物管理</h2>

      <details open>
        <summary id="hingeSummary">丁番一覧（0件）</summary>
        <div id="hingeList" class="list-wrap"></div>
      </details>

      <div style="height:10px;"></div>

      <details open>
        <summary id="strikeSummary">ストライク一覧（0件）</summary>
        <div id="strikeList" class="list-wrap"></div>
      </details>

      <div style="height:10px;"></div>

      <details open>
        <summary id="otherSummary">その他金物一覧（0件）</summary>
        <div id="otherList" class="list-wrap"></div>
      </details>
    </div>

    <div class="footer-space"></div>
  </div>

  <script>
    const francePreset = {
      DE6VN: 18.5,
      DC800: 18.5,
      none: 0
    };

    const state = {
      hardware: []
    };

    const el = {
      doorType: document.getElementById('doorType'),
      parentW: document.getElementById('parentW'),
      meeting: document.getElementById('meeting'),
      franceType: document.getElementById('franceType'),
      franceValue: document.getElementById('franceValue'),
      calcMode: document.getElementById('calcMode'),

      newName: document.getElementById('newName'),
      newType: document.getElementById('newType'),
      newValue: document.getElementById('newValue'),
      newOp: document.getElementById('newOp'),
      newThickness: document.getElementById('newThickness'),
      newFrameThickness: document.getElementById('newFrameThickness'),

      addHardwareBtn: document.getElementById('addHardwareBtn'),
      resetBtn: document.getElementById('resetBtn'),

      equation: document.getElementById('equation'),
      resultValue: document.getElementById('resultValue'),
      resultText: document.getElementById('resultText'),
      previewText: document.getElementById('previewText'),

      hingeSummary: document.getElementById('hingeSummary'),
      strikeSummary: document.getElementById('strikeSummary'),
      otherSummary: document.getElementById('otherSummary'),

      hingeList: document.getElementById('hingeList'),
      strikeList: document.getElementById('strikeList'),
      otherList: document.getElementById('otherList')
    };

    function toNum(v){
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : 0;
    }

    function fmt(n){
      if (!Number.isFinite(n)) return "0";
      return Number.isInteger(n) ? String(n) : String(parseFloat(n.toFixed(3)));
    }

    function updateFranceValue(){
      const t = el.franceType.value;
      if (document.activeElement !== el.franceValue || !el.franceValue.dataset.manual) {
        el.franceValue.value = francePreset[t] ?? 0;
      }
      render();
    }

    function getBaseTerms(){
      const parentW = toNum(el.parentW.value);
      const meeting = toNum(el.meeting.value);
      const meetingHalf = meeting / 2;
      const franceType = el.franceType.value;
      const franceName = franceType === 'none' ? 'なし' : franceType;
      const franceValue = toNum(el.franceValue.value);
      const mode = el.calcMode.value;

      const baseTerms = [];

      baseTerms.push({
        label: `親W(${fmt(parentW)})`,
        value: parentW,
        op: '+',
        preview: `親W${fmt(parentW)}`
      });

      if (meeting !== 0) {
        baseTerms.push({
          label: `召合わせ(${fmt(meeting)}→${fmt(meetingHalf)})`,
          value: meetingHalf,
          op: mode === 'plus' ? '+' : '-',
          preview: `召合わせ${fmt(meeting)}(${fmt(meetingHalf)})`
        });
      }

      if (franceType !== 'none' && franceValue !== 0) {
        baseTerms.push({
          label: `${franceName}(${fmt(franceValue)})`,
          value: franceValue,
          op: mode === 'plus' ? '+' : '-',
          preview: `${franceName}(${fmt(franceValue)})`
        });
      }

      return baseTerms;
    }

    function calculate(){
      const terms = [...getBaseTerms(), ...state.hardware];
      let total = 0;

      terms.forEach((t, i) => {
        if (i === 0) {
          total += t.value;
        } else {
          total += (t.op === '+' ? t.value : -t.value);
        }
      });

      return { terms, total };
    }

    function renderEquation(terms, total){
      el.equation.innerHTML = '';

      terms.forEach((t, i) => {
        if (i > 0) {
          const op = document.createElement('div');
          op.className = 'operator';
          op.textContent = t.op === '+' ? '＋' : '－';
          el.equation.appendChild(op);
        }

        const term = document.createElement('div');
        term.className = 'term';
        term.textContent = t.label;
        el.equation.appendChild(term);
      });

      const eq = document.createElement('div');
      eq.className = 'operator';
      eq.textContent = '=';
      el.equation.appendChild(eq);

      const result = document.createElement('div');
      result.className = 'term';
      result.style.borderColor = '#86efac';
      result.style.fontWeight = '900';
      result.textContent = fmt(total);
      el.equation.appendChild(result);
    }

    function buildPreview(terms, total){
      if (!terms.length) return '';
      let text = '';

      terms.forEach((t, i) => {
        if (i === 0) {
          text += t.preview;
        } else {
          text += `${t.op === '+' ? '＋' : '－'}${t.preview}`;
        }
      });

      text += `＝${fmt(total)}`;
      return text;
    }

    function groupHardware(){
      const hinge = [];
      const strike = [];
      const other = [];

      state.hardware.forEach((item, index) => {
        const name = (item.name || '').toLowerCase();
        if (name.includes('丁番')) {
          hinge.push({ ...item, index });
        } else if (name.includes('ストライク')) {
          strike.push({ ...item, index });
        } else {
          other.push({ ...item, index });
        }
      });

      return { hinge, strike, other };
    }

    function renderList(listEl, items){
      listEl.innerHTML = '';

      if (!items.length) {
        listEl.innerHTML = '<div class="empty">登録なし</div>';
        return;
      }

      items.forEach(item => {
        const thicknessValid = item.thickness !== '' && item.thickness !== undefined;
        const frameValid = item.frameThickness !== '' && item.frameThickness !== undefined;
        const spacer = (thicknessValid && frameValid)
          ? Math.max(0, toNum(item.thickness) - toNum(item.frameThickness))
          : 0;

        const card = document.createElement('div');
        card.className = 'item';

        card.innerHTML = `
          <div class="item-head">
            <div class="item-title">${escapeHtml(item.name || '名称未設定')}${item.type ? ' / ' + escapeHtml(item.type) : ''}</div>
            <div class="badge">${item.op === '+' ? '加算' : '減算'} ${fmt(toNum(item.value))}</div>
          </div>

          <div class="item-grid">
            <div>
              <label>名称</label>
              <input value="${escapeAttr(item.name || '')}" data-field="name" data-index="${item.index}">
            </div>

            <div>
              <label>種類</label>
              <input value="${escapeAttr(item.type || '')}" data-field="type" data-index="${item.index}">
            </div>

            <div>
              <label>寸法</label>
              <input type="number" inputmode="decimal" value="${escapeAttr(item.value)}" data-field="value" data-index="${item.index}">
            </div>

            <div>
              <label>符号</label>
              <select data-field="op" data-index="${item.index}">
                <option value="+" ${item.op === '+' ? 'selected' : ''}>＋</option>
                <option value="-" ${item.op === '-' ? 'selected' : ''}>－</option>
              </select>
            </div>

            <div>
              <label>厚み</label>
              <input type="number" inputmode="decimal" step="0.1" value="${escapeAttr(item.thickness ?? '')}" data-field="thickness" data-index="${item.index}">
            </div>

            <div>
              <label>枠板厚</label>
              <input type="number" inputmode="decimal" step="0.1" value="${escapeAttr(item.frameThickness ?? '')}" data-field="frameThickness" data-index="${item.index}">
            </div>

            <div class="full">
              <label>必要スペーサー</label>
              <input value="${fmt(spacer)}" readonly>
            </div>

            <div class="full">
              <button class="ghost-btn" data-delete="${item.index}" type="button">削除</button>
            </div>
          </div>
        `;

        listEl.appendChild(card);
      });
    }

    function renderSummaries(groups){
      el.hingeSummary.textContent = `丁番一覧（${groups.hinge.length}件）`;
      el.strikeSummary.textContent = `ストライク一覧（${groups.strike.length}件）`;
      el.otherSummary.textContent = `その他金物一覧（${groups.other.length}件）`;
    }

    function makeHardwareLabel(name, type, value, thickness, frameThickness){
      let text = name || '名称未設定';
      if (type) text += `/${type}`;
      text += `(${fmt(toNum(value))})`;

      const thicknessValid = thickness !== '' && thickness !== undefined;
      const frameValid = frameThickness !== '' && frameThickness !== undefined;

      if ((name || '').includes('ストライク') && thicknessValid && frameValid) {
        const spacer = Math.max(0, toNum(thickness) - toNum(frameThickness));
        text += ` 厚${fmt(toNum(thickness))} 枠${fmt(toNum(frameThickness))} SP${fmt(spacer)}`;
      }

      return text;
    }

    function makeHardwarePreview(name, type, value){
      const nm = name || '名称未設定';
      if (type) return `${nm}/${type}(${fmt(toNum(value))})`;
      return `${nm}(${fmt(toNum(value))})`;
    }

    function syncHardwareLabels(){
      state.hardware = state.hardware.map(item => ({
        ...item,
        value: item.value === '' ? '' : toNum(item.value),
        label: makeHardwareLabel(item.name, item.type, item.value, item.thickness, item.frameThickness),
        preview: makeHardwarePreview(item.name, item.type, item.value)
      }));
    }

    function render(){
      syncHardwareLabels();

      const { terms, total } = calculate();
      renderEquation(terms, total);

      const preview = buildPreview(terms, total);
      el.resultValue.textContent = fmt(total);
      el.resultText.textContent = preview || '式がここに表示されます';
      el.previewText.textContent = preview || '親W900－召合わせ6(3)－DE6VN(18.5)=878.5';

      const groups = groupHardware();
      renderSummaries(groups);
      renderList(el.hingeList, groups.hinge);
      renderList(el.strikeList, groups.strike);
      renderList(el.otherList, groups.other);
    }

    function addHardware(){
      const name = el.newName.value.trim();
      const type = el.newType.value.trim();
      const value = el.newValue.value.trim();
      const op = el.newOp.value;
      const thickness = el.newThickness.value.trim();
      const frameThickness = el.newFrameThickness.value.trim();

      if (!name) {
        alert('名称を入力してください');
        return;
      }

      state.hardware.push({
        name,
        type,
        value: value === '' ? 0 : toNum(value),
        op,
        thickness: thickness === '' ? '' : toNum(thickness),
        frameThickness: frameThickness === '' ? '' : toNum(frameThickness)
      });

      el.newName.value = '';
      el.newType.value = '';
      el.newValue.value = '';
      el.newOp.value = '+';
      el.newThickness.value = '';
      el.newFrameThickness.value = '';

      render();
    }

    function resetAll(){
      el.doorType.value = 'france';
      el.parentW.value = '';
      el.meeting.value = '';
      el.franceType.value = 'DE6VN';
      el.franceValue.value = '18.5';
      el.calcMode.value = 'minus';
      el.franceValue.dataset.manual = '';

      state.hardware = [];
      render();
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(str){
      return escapeHtml(str);
    }

    el.franceType.addEventListener('change', () => {
      el.franceValue.dataset.manual = '';
      updateFranceValue();
    });

    el.franceValue.addEventListener('input', () => {
      el.franceValue.dataset.manual = '1';
      render();
    });

    [el.parentW, el.meeting, el.calcMode, el.doorType].forEach(node => {
      node.addEventListener('input', render);
      node.addEventListener('change', render);
    });

    el.addHardwareBtn.addEventListener('click', addHardware);
    el.resetBtn.addEventListener('click', resetAll);

    document.addEventListener('input', (e) => {
      const t = e.target;
      const index = t.dataset.index;
      const field = t.dataset.field;

      if (index === undefined || !field) return;
      const item = state.hardware[Number(index)];
      if (!item) return;

      if (field === 'value' || field === 'thickness' || field === 'frameThickness') {
        item[field] = t.value === '' ? '' : toNum(t.value);
      } else {
        item[field] = t.value;
      }

      render();
    });

    document.addEventListener('change', (e) => {
      const t = e.target;
      const index = t.dataset.index;
      const field = t.dataset.field;

      if (index === undefined || !field) return;
      const item = state.hardware[Number(index)];
      if (!item) return;

      if (field === 'value' || field === 'thickness' || field === 'frameThickness') {
        item[field] = t.value === '' ? '' : toNum(t.value);
      } else {
        item[field] = t.value;
      }

      render();
    });

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-delete]');
      if (!btn) return;

      const index = Number(btn.dataset.delete);
      state.hardware.splice(index, 1);
      render();
    });

    updateFranceValue();
    render();
  </script>
</body>
</html>
