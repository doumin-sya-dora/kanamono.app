<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>建具金物計算アプリ 完全版</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#d9e0ea;
      --text:#1f2a37;
      --sub:#667085;
      --blue:#2563eb;
      --blue2:#eff6ff;
      --green:#16a34a;
      --red:#dc2626;
      --shadow:0 6px 18px rgba(15, 23, 42, 0.08);
      --radius:14px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      -webkit-text-size-adjust:100%;
    }

    body{
      padding:14px;
    }

    .app{
      max-width:980px;
      margin:0 auto;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin:4px 0 14px;
      letter-spacing:.02em;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
      margin-bottom:14px;
    }

    .panel h2{
      margin:0 0 10px;
      font-size:16px;
    }

    .row{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:10px;
    }

    .col-12{ grid-column:span 12; }
    .col-8{ grid-column:span 8; }
    .col-6{ grid-column:span 6; }
    .col-4{ grid-column:span 4; }
    .col-3{ grid-column:span 3; }

    label{
      display:block;
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }

    input, select, button{
      width:100%;
      min-height:42px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      font-size:16px;
      background:#fff;
    }

    input:focus, select:focus{
      outline:none;
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    button{
      cursor:pointer;
      font-weight:700;
      border:none;
      background:var(--blue);
      color:#fff;
    }

    button.secondary{
      background:#eef2f7;
      color:var(--text);
      border:1px solid var(--line);
    }

    button.danger{
      background:var(--red);
    }

    .mini{
      font-size:12px;
      color:var(--sub);
      margin-top:6px;
    }

    .equation-wrap{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .equation{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:6px;
      background:var(--blue2);
      border:1px solid #cfe0ff;
      border-radius:12px;
      padding:10px;
      overflow-x:hidden;
    }

    .term{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:6px 10px;
      border-radius:10px;
      background:#fff;
      border:1px solid #cfe0ff;
      font-weight:700;
      font-size:13px;
      line-height:1.2;
      white-space:nowrap;
      max-width:100%;
    }

    .operator{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      font-weight:900;
      color:var(--blue);
      font-size:18px;
      flex:0 0 auto;
    }

    .result-box{
      background:#fff;
      border:2px solid var(--green);
      border-radius:12px;
      padding:12px;
    }

    .result-label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }

    .result-value{
      font-size:28px;
      font-weight:900;
      color:var(--green);
      line-height:1.1;
    }

    .sub-result{
      margin-top:6px;
      font-size:13px;
      color:var(--sub);
      word-break:break-word;
    }

    details{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      overflow:hidden;
    }

    summary{
      list-style:none;
      cursor:pointer;
      padding:12px;
      font-weight:800;
      user-select:none;
      background:#f8fafc;
      border-bottom:1px solid var(--line);
    }

    summary::-webkit-details-marker{
      display:none;
    }

    .list-wrap{
      padding:10px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      margin-bottom:10px;
      background:#fff;
    }

    .item-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .item-title{
      font-size:14px;
      font-weight:800;
    }

    .badge{
      font-size:12px;
      background:#eef2ff;
      color:#3730a3;
      padding:4px 8px;
      border-radius:999px;
      font-weight:700;
    }

    .item-grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:8px;
    }

    .item-grid .col{
      grid-column:span 3;
    }

    .item-grid .wide{
      grid-column:span 4;
    }

    .item-grid .full{
      grid-column:span 12;
    }

    .ghost-btn{
      background:#fff;
      color:var(--red);
      border:1px solid #fecaca;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .actions > *{
      flex:1 1 140px;
    }

    .preview{
      background:#0f172a;
      color:#e2e8f0;
      border-radius:12px;
      padding:12px;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.6;
      font-size:13px;
    }

    .muted{
      color:var(--sub);
      font-size:12px;
    }

    @media (max-width: 760px){
      .col-8,.col-6,.col-4,.col-3{ grid-column:span 12; }
      .item-grid .col,
      .item-grid .wide{ grid-column:span 12; }

      .title{
        font-size:20px;
      }

      .term{
        font-size:12px;
        min-height:34px;
        padding:6px 8px;
      }

      .operator{
        min-width:18px;
        font-size:16px;
      }

      .result-value{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">建具金物計算アプリ 完全版</div>

    <div class="panel">
      <h2>基本入力</h2>
      <div class="row">
        <div class="col-4">
          <label for="doorType">計算タイプ</label>
          <select id="doorType">
            <option value="france">親W＋召合わせ＋フランス落とし</option>
            <option value="custom">自由計算</option>
          </select>
        </div>

        <div class="col-4">
          <label for="parentW">親W</label>
          <input id="parentW" type="number" inputmode="decimal" placeholder="例: 900" />
        </div>

        <div class="col-4">
          <label for="meeting">召合わせ寸法</label>
          <input id="meeting" type="number" inputmode="decimal" placeholder="例: 6" />
          <div class="mini">表示時は自動で半分にして <b>6(3)</b> のように表示</div>
        </div>

        <div class="col-4">
          <label for="franceType">フランス落とし種類</label>
          <select id="franceType">
            <option value="DE6VN" selected>DE6VN (18.5)</option>
            <option value="DC800">DC800</option>
            <option value="none">なし</option>
          </select>
        </div>

        <div class="col-4">
          <label for="franceValue">フランス落とし寸法</label>
          <input id="franceValue" type="number" inputmode="decimal" placeholder="自動入力されます" />
        </div>

        <div class="col-4">
          <label for="calcMode">演算方法</label>
          <select id="calcMode">
            <option value="minus">親W － 召合わせ(半表示) － フランス落とし</option>
            <option value="plus">親W ＋ 召合わせ(半表示) ＋ フランス落とし</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>追加金物</h2>
      <div class="row">
        <div class="col-4">
          <label for="newName">名称</label>
          <input id="newName" type="text" placeholder="例: 丁番 / ストライク / 引手" />
        </div>

        <div class="col-4">
          <label for="newType">種類</label>
          <input id="newType" type="text" placeholder="例: LA / 標準 / 特注" />
        </div>

        <div class="col-4">
          <label for="newValue">寸法</label>
          <input id="newValue" type="number" inputmode="decimal" placeholder="例: 25" />
        </div>

        <div class="col-4">
          <label for="newOp">符号</label>
          <select id="newOp">
            <option value="+">＋</option>
            <option value="-">－</option>
          </select>
        </div>

        <div class="col-4">
          <label for="newThickness">厚み（ストライク用など）</label>
          <input id="newThickness" type="number" inputmode="decimal" step="0.1" placeholder="例: 2.5" />
        </div>

        <div class="col-4">
          <label for="newFrameThickness">枠板厚</label>
          <input id="newFrameThickness" type="number" inputmode="decimal" step="0.1" placeholder="例: 1.6" />
        </div>

        <div class="col-12">
          <div class="actions">
            <button id="addHardwareBtn">金物を追加</button>
            <button id="resetBtn" class="secondary">全部リセット</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>計算プレビュー</h2>
      <div class="equation-wrap">
        <div id="equation" class="equation"></div>

        <div class="result-box">
          <div class="result-label">計算結果</div>
          <div id="resultValue" class="result-value">0</div>
          <div id="resultText" class="sub-result">式がここに表示されます</div>
        </div>

        <div>
          <div class="muted" style="margin-bottom:6px;">現場向け表示</div>
          <div id="previewText" class="preview">親W900－召合わせ6(3)－DE6VN(18.5)=878.5</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>金物管理</h2>

      <details open>
        <summary id="hingeSummary">丁番一覧（0件）</summary>
        <div id="hingeList" class="list-wrap"></div>
      </details>

      <div style="height:10px;"></div>

      <details open>
        <summary id="strikeSummary">ストライク一覧（0件）</summary>
        <div id="strikeList" class="list-wrap"></div>
      </details>

      <div style="height:10px;"></div>

      <details open>
        <summary id="otherSummary">その他金物一覧（0件）</summary>
        <div id="otherList" class="list-wrap"></div>
      </details>
    </div>
  </div>

  <script>
    const francePreset = {
      DE6VN: 18.5,
      DC800: 18.5,
      none: 0
    };

    const state = {
      hardware: []
    };

    const el = {
      doorType: document.getElementById('doorType'),
      parentW: document.getElementById('parentW'),
      meeting: document.getElementById('meeting'),
      franceType: document.getElementById('franceType'),
      franceValue: document.getElementById('franceValue'),
      calcMode: document.getElementById('calcMode'),

      newName: document.getElementById('newName'),
      newType: document.getElementById('newType'),
      newValue: document.getElementById('newValue'),
      newOp: document.getElementById('newOp'),
      newThickness: document.getElementById('newThickness'),
      newFrameThickness: document.getElementById('newFrameThickness'),

      addHardwareBtn: document.getElementById('addHardwareBtn'),
      resetBtn: document.getElementById('resetBtn'),

      equation: document.getElementById('equation'),
      resultValue: document.getElementById('resultValue'),
      resultText: document.getElementById('resultText'),
      previewText: document.getElementById('previewText'),

      hingeSummary: document.getElementById('hingeSummary'),
      strikeSummary: document.getElementById('strikeSummary'),
      otherSummary: document.getElementById('otherSummary'),

      hingeList: document.getElementById('hingeList'),
      strikeList: document.getElementById('strikeList'),
      otherList: document.getElementById('otherList')
    };

    function toNum(v){
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : 0;
    }

    function fmt(n){
      if (!Number.isFinite(n)) return "0";
      return Number.isInteger(n) ? String(n) : String(parseFloat(n.toFixed(3)));
    }

    function updateFranceValue(){
      const t = el.franceType.value;
      if (document.activeElement !== el.franceValue || !el.franceValue.dataset.manual) {
        el.franceValue.value = francePreset[t] ?? 0;
      }
      render();
    }

    function getBaseTerms(){
      const parentW = toNum(el.parentW.value);
      const meeting = toNum(el.meeting.value);
      const meetingHalf = meeting / 2;
      const franceType = el.franceType.value;
      const franceName = franceType === 'none' ? 'なし' : franceType;
      const franceValue = toNum(el.franceValue.value);
      const mode = el.calcMode.value;

      const baseTerms = [];

      baseTerms.push({
        label: `親W(${fmt(parentW)})`,
        value: parentW,
        op: '+',
        preview: `親W${fmt(parentW)}`
      });

      if (meeting !== 0) {
        baseTerms.push({
          label: `召合わせ(${fmt(meeting)}→${fmt(meetingHalf)})`,
          value: meetingHalf,
          op: mode === 'plus' ? '+' : '-',
          preview: `召合わせ${fmt(meeting)}(${fmt(meetingHalf)})`
        });
      }

      if (franceType !== 'none' && franceValue !== 0) {
        baseTerms.push({
          label: `${franceName}(${fmt(franceValue)})`,
          value: franceValue,
          op: mode === 'plus' ? '+' : '-',
          preview: `${franceName}(${fmt(franceValue)})`
        });
      }

      return baseTerms;
    }

    function calculate(){
      const terms = [...getBaseTerms(), ...state.hardware];
      let total = 0;

      terms.forEach((t, i) => {
        if (i === 0) {
          total += t.value;
        } else {
          total += (t.op === '+' ? t.value : -t.value);
        }
      });

      return { terms, total };
    }

    function renderEquation(terms, total){
      el.equation.innerHTML = '';

      terms.forEach((t, i) => {
        if (i > 0) {
          const op = document.createElement('div');
          op.className = 'operator';
          op.textContent = t.op === '+' ? '＋' : '－';
          el.equation.appendChild(op);
        }

        const term = document.createElement('div');
        term.className = 'term';
        term.textContent = t.label;
        el.equation.appendChild(term);
      });

      const eq = document.createElement('div');
      eq.className = 'operator';
      eq.textContent = '=';
      el.equation.appendChild(eq);

      const result = document.createElement('div');
      result.className = 'term';
      result.style.borderColor = '#86efac';
      result.style.fontWeight = '900';
      result.textContent = fmt(total);
      el.equation.appendChild(result);
    }

    function buildPreview(terms, total){
      if (!terms.length) return '';
      let text = '';

      terms.forEach((t, i) => {
        if (i === 0) {
          text += t.preview;
        } else {
          text += `${t.op === '+' ? '＋' : '－'}${t.preview}`;
        }
      });

      text += `＝${fmt(total)}`;
      return text;
    }

    function groupHardware(){
      const hinge = [];
      const strike = [];
      const other = [];

      state.hardware.forEach((item, index) => {
        const name = (item.name || '').toLowerCase();
        if (name.includes('丁番')) {
          hinge.push({ ...item, index });
        } else if (name.includes('ストライク')) {
          strike.push({ ...item, index });
        } else {
          other.push({ ...item, index });
        }
      });

      return { hinge, strike, other };
    }

    function renderList(listEl, items){
      listEl.innerHTML = '';

      if (!items.length) {
        listEl.innerHTML = '<div class="muted">登録なし</div>';
        return;
      }

      items.forEach(item => {
        const spacer = (item.thickness && item.frameThickness)
          ? Math.max(0, item.thickness - item.frameThickness)
          : 0;

        const card = document.createElement('div');
        card.className = 'item';

        card.innerHTML = `
          <div class="item-head">
            <div class="item-title">${escapeHtml(item.name || '名称未設定')} ${item.type ? ' / ' + escapeHtml(item.type) : ''}</div>
            <div class="badge">${item.op === '+' ? '加算' : '減算'} ${fmt(item.value)}</div>
          </div>

          <div class="item-grid">
            <div class="col">
              <label>名称</label>
              <input value="${escapeAttr(item.name || '')}" data-field="name" data-index="${item.index}">
            </div>
            <div class="col">
              <label>種類</label>
              <input value="${escapeAttr(item.type || '')}" data-field="type" data-index="${item.index}">
            </div>
            <div class="col">
              <label>寸法</label>
              <input type="number" inputmode="decimal" value="${escapeAttr(item.value)}" data-field="value" data-index="${item.index}">
            </div>
            <div class="col">
              <label>符号</label>
              <select data-field="op" data-index="${item.index}">
                <option value="+" ${item.op === '+' ? 'selected' : ''}>＋</option>
                <option value="-" ${item.op === '-' ? 'selected' : ''}>－</option>
              </select>
            </div>

            <div class="wide">
              <label>厚み</label>
              <input type="number" inputmode="decimal" step="0.1" value="${escapeAttr(item.thickness ?? '')}" data-field="thickness" data-index="${item.index}">
            </div>
            <div class="wide">
              <label>枠板厚</label>
              <input type="number" inputmode="decimal" step="0.1" value="${escapeAttr(item.frameThickness ?? '')}" data-field="frameThickness" data-index="${item.index}">
            </div>
            <div class="wide">
              <label>必要スペーサー</label>
              <input value="${fmt(spacer)}" readonly>
            </div>

            <div class="full">
              <button class="ghost-btn" data-delete="${item.index}">削除</button>
            </div>
          </div>
        `;

        listEl.appendChild(card);
      });
    }

    function renderSummaries(groups){
      el.hingeSummary.textContent = `丁番一覧（${groups.hinge.length}件）`;
      el.strikeSummary.textContent = `ストライク一覧（${groups.strike.length}件）`;
      el.otherSummary.textContent = `その他金物一覧（${groups.other.length}件）`;
    }

    function render(){
      const { terms, total } = calculate();
      renderEquation(terms, total);

      const preview = buildPreview(terms, total);
      el.resultValue.textContent = fmt(total);
      el.resultText.textContent = preview || '式がここに表示されます';
      el.previewText.textContent = preview || '親W900－召合わせ6(3)－DE6VN(18.5)=878.5';

      const groups = groupHardware();
      renderSummaries(groups);
      renderList(el.hingeList, groups.hinge);
      renderList(el.strikeList, groups.strike);
      renderList(el.otherList, groups.other);
    }

    function addHardware(){
      const name = el.newName.value.trim();
      const type = el.newType.value.trim();
      const value = toNum(el.newValue.value);
      const op = el.newOp.value;
      const thickness = el.newThickness.value === '' ? '' : toNum(el.newThickness.value);
      const frameThickness = el.newFrameThickness.value === '' ? '' : toNum(el.newFrameThickness.value);

      if (!name) {
        alert('名称を入力してください');
        return;
      }

      state.hardware.push({
        name,
        type,
        value,
        op,
        thickness,
        frameThickness,
        label: makeHardwareLabel(name, type, value, thickness, frameThickness),
        preview: makeHardwarePreview(name, type, value),
      });

      el.newName.value = '';
      el.newType.value = '';
      el.newValue.value = '';
      el.newOp.value = '+';
      el.newThickness.value = '';
      el.newFrameThickness.value = '';

      syncHardwareLabels();
      render();
    }

    function makeHardwareLabel(name, type, value, thickness, frameThickness){
      let text = name;
      if (type) text += `/${type}`;
      text += `(${fmt(value)})`;

      if (name.includes('ストライク') && thickness !== '' && frameThickness !== '') {
        const spacer = Math.max(0, toNum(thickness) - toNum(frameThickness));
        text += ` 厚${fmt(thickness)} 枠${fmt(frameThickness)} SP${fmt(spacer)}`;
      }
      return text;
    }

    function makeHardwarePreview(name, type, value){
      if (type) return `${name}${type ? '/' + type : ''}(${fmt(value)})`;
      return `${name}(${fmt(value)})`;
    }

    function syncHardwareLabels(){
      state.hardware = state.hardware.map(item => ({
        ...item,
        value: toNum(item.value),
        label: makeHardwareLabel(item.name, item.type, item.value, item.thickness, item.frameThickness),
        preview: makeHardwarePreview(item.name, item.type, item.value)
      }));
    }

    function resetAll(){
      el.parentW.value = '';
      el.meeting.value = '';
      el.franceType.value = 'DE6VN';
      el.franceValue.value = '18.5';
      el.calcMode.value = 'minus';

      state.hardware = [];
      render();
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(str){
      return escapeHtml(str);
    }

    el.franceType.addEventListener('change', () => {
      el.franceValue.dataset.manual = '';
      updateFranceValue();
    });

    el.franceValue.addEventListener('input', () => {
      el.franceValue.dataset.manual = '1';
      render();
    });

    [el.parentW, el.meeting, el.calcMode, el.doorType].forEach(node => {
      node.addEventListener('input', render);
      node.addEventListener('change', render);
    });

    el.addHardwareBtn.addEventListener('click', addHardware);
    el.resetBtn.addEventListener('click', resetAll);

    document.addEventListener('input', (e) => {
      const target = e.target;
      const index = target.dataset.index;
      const field = target.dataset.field;
      if (index === undefined || !field) return;

      const item = state.hardware[Number(index)];
      if (!item) return;

      if (field === 'value' || field === 'thickness' || field === 'frameThickness') {
        item[field] = target.value === '' ? '' : toNum(target.value);
      } else {
        item[field] = target.value;
      }

      syncHardwareLabels();
      render();
    });

    document.addEventListener('change', (e) => {
      const target = e.target;
      if (target.dataset.delete !== undefined) return;

      const index = target.dataset.index;
      const field = target.dataset.field;
      if (index === undefined || !field) return;

      const item = state.hardware[Number(index)];
      if (!item) return;

      item[field] = target.value;
      syncHardwareLabels();
      render();
    });

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-delete]');
      if (!btn) return;

      const index = Number(btn.dataset.delete);
      state.hardware.splice(index, 1);
      render();
    });

    updateFranceValue();
    render();
  </script>
</body>
</html>
